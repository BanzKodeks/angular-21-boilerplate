<div *ngIf="tokenStatus === TokenStatus.Validating">
    Validating token...
</div>

<div *ngIf="tokenStatus === TokenStatus.Invalid">
    Token Invalid
</div>

<form
    *ngIf="tokenStatus === TokenStatus.Valid"
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
>

    <div class="mb-3">
        <label>Password</label>

        <input
            type="password"
            formControlName="password"
            class="form-control"
        />
    </div>

    <div class="mb-3">
        <label>Confirm Password</label>

        <input
            type="password"
            formControlName="confirmPassword"
            class="form-control"
        />
    </div>

    <button class="btn btn-primary">
        Reset Password
    </button>

</form>
