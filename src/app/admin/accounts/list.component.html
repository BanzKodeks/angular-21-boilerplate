<h1>Accounts</h1>

<a routerLink="add" class="btn btn-sm btn-success mb-2">
    Add Account
</a>

<table class="table table-striped">

    <thead>
        <tr>
            <th style="width: 15%">Title</th>
            <th style="width: 20%">First Name</th>
            <th style="width: 20%">Last Name</th>
            <th style="width: 25%">Email</th>
            <th style="width: 10%">Role</th>
            <th style="width: 10%"></th>
        </tr>
    </thead>

    <tbody>

        <tr *ngFor="let account of accounts">

            <td>{{ account.title }}</td>
            <td>{{ account.firstName }}</td>
            <td>{{ account.lastName }}</td>
            <td>{{ account.email }}</td>
            <td>{{ account.role }}</td>

            <td style="white-space: nowrap">

                <a
                    routerLink="edit/{{ account.id }}"
                    class="btn btn-sm btn-primary me-1"
                >
                    Edit
                </a>

                <button
                    (click)="deleteAccount(account.id)"
                    class="btn btn-sm btn-danger btn-delete-account"
                    [disabled]="account.isDeleting"
                >

                    <span
                        *ngIf="account.isDeleting"
                        class="spinner-border spinner-border-sm"
                    ></span>

                    <span *ngIf="!account.isDeleting">
                        Delete
                    </span>

                </button>

            </td>

        </tr>

    </tbody>

</table>
